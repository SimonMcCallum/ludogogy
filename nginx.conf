# Nginx configuration for ludogogy.co.nz
#
# This site lives as a subfolder on the server. The domain ludogogy.co.nz
# points to this server and nginx routes it to the correct subfolder.
#
# Setup:
#   sudo cp nginx.conf /etc/nginx/sites-available/ludogogy.co.nz
#   sudo ln -s /etc/nginx/sites-available/ludogogy.co.nz /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d ludogogy.co.nz -d www.ludogogy.co.nz
#   sudo nginx -t && sudo systemctl reload nginx
#
# Deploy the built _site/ directory to: /var/www/ludogogy.co.nz/

server {
    listen 80;
    server_name ludogogy.co.nz www.ludogogy.co.nz;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ludogogy.co.nz www.ludogogy.co.nz;

    # SSL certificate paths - update these to match your certbot/SSL setup
    ssl_certificate /etc/letsencrypt/live/ludogogy.co.nz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ludogogy.co.nz/privkey.pem;

    # Site root - deploy _site/ contents here
    root /var/www/ludogogy.co.nz;
    index index.html;

    # Redirect www to non-www
    if ($host = www.ludogogy.co.nz) {
        return 301 https://ludogogy.co.nz$request_uri;
    }

    # Main location - Eleventy generates clean /page/index.html directories
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    error_page 404 /404.html;

    access_log /var/log/nginx/ludogogy.co.nz.access.log;
    error_log /var/log/nginx/ludogogy.co.nz.error.log;
}
